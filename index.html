<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cells</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            margin: 10px 0;
            color: #f0f;
            text-shadow: 0 0 15px #f0f;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
            justify-content: center;
            max-width: 900px;
        }

        .control-group {
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .control-group label {
            font-size: 10px;
            color: #ff0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(0,255,255,0.1);
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        button.active {
            background: #0ff;
            color: #000;
        }

        select {
            background: #000;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
        }

        canvas {
            border: 2px solid #0ff;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
            background: #0a0a0a;
            cursor: crosshair;
            touch-action: none;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 12px;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        .instructions {
            margin-top: 8px;
            font-size: 11px;
            color: #888;
            text-align: center;
            max-width: 600px;
        }

        .mobile-draw {
            display: none;
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>NEON CELLS</h1>

    <div class="controls">
        <div class="control-group">
            <label>Play/Pause</label>
            <button id="playPause">PAUSE</button>
        </div>

        <div class="control-group">
            <label>Speed</label>
            <select id="speed">
                <option value="1000">Slow</option>
                <option value="500" selected>Normal</option>
                <option value="200">Fast</option>
                <option value="50">Ultra</option>
            </select>
        </div>

        <div class="control-group">
            <label>Color</label>
            <select id="colorScheme">
                <option value="cyber">Cyber (Cyan/Pink)</option>
                <option value="inferno">Inferno (Red/Yellow)</option>
                <option value="matrix">Matrix (Greens)</option>
                <option value="ocean">Ocean (Blues)</option>
                <option value="rainbow">Rainbow Cycle</option>
                <option value="mono">Monochrome</option>
            </select>
        </div>

        <div class="control-group">
            <label>Density</label>
            <select id="density">
                <option value="sparse">Sparse</option>
                <option value="medium" selected>Medium</option>
                <option value="dense">Dense</option>
                <option value="full">Full Random</option>
            </select>
        </div>

        <div class="control-group">
            <label>Actions</label>
            <div style="display:flex; gap:4px;">
                <button id="clearBtn">Clear</button>
                <button id="randomBtn">Random</button>
            </div>
        </div>

        <div class="control-group">
            <label>Rules</label>
            <select id="rules">
                <option value="conway">Conway (Classic)</option>
                <option value="highlife">HighLife</option>
                <option value="seeds">Seeds</option>
                <option value="maze">Maze</option>
            </select>
        </div>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="stats">
        <div>Generation: <span id="genCount">0</span></div>
        <div>Population: <span id="popCount">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <div class="instructions">
        Click/drag on canvas to draw/erase cells • Space to pause • 'C' clear • 'R' randomize
    </div>

    <div class="mobile-draw" id="mobileHint">Touch and drag to draw cells</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const playPauseBtn = document.getElementById('playPause');
        const speedSelect = document.getElementById('speed');
        const colorSchemeSelect = document.getElementById('colorScheme');
        const densitySelect = document.getElementById('density');
        const clearBtn = document.getElementById('clearBtn');
        const randomBtn = document.getElementById('randomBtn');
        const rulesSelect = document.getElementById('rules');
        const genCountEl = document.getElementById('genCount');
        const popCountEl = document.getElementById('popCount');
        const fpsEl = document.getElementById('fps');

        const cellSize = 8;
        const cols = Math.floor(canvas.width / cellSize);
        const rows = Math.floor(canvas.height / cellSize);

        let grid = createGrid();
        let nextGrid = createGrid();
        let running = true;
        let generation = 0;
        let lastFrameTime = 0;
        let fps = 60;
        let isDrawing = false;
        let drawMode = 1; // 1 = draw, 0 = erase

        const colorPalettes = {
            cyber: { alive: '#00ffff', dead: '#0a0a0a', glow: 'rgba(0,255,255,0.4)' },
            inferno: { alive: '#ff4400', dead: '#0a0a0a', glow: 'rgba(255,68,0,0.4)' },
            matrix: { alive: '#00ff00', dead: '#0a0a0a', glow: 'rgba(0,255,0,0.4)' },
            ocean: { alive: '#0088ff', dead: '#0a0a0a', glow: 'rgba(0,136,255,0.4)' },
            rainbow: { alive: 'rainbow', dead: '#0a0a0a', glow: 'rgba(255,0,255,0.4)' },
            mono: { alive: '#ffffff', dead: '#0a0a0a', glow: 'rgba(255,255,255,0.4)' }
        };

        let currentPalette = colorPalettes.cyber;

        // Conway's rules: B3/S23 (birth on 3, survive on 2 or 3)
        const ruleSets = {
            conway: { birth: [3], survive: [2,3] },
            highlife: { birth: [3,6], survive: [2,3] },
            seeds: { birth: [2], survive: [] },
            maze: { birth: [3], survive: [1,2,3,4,5] } // weird
        };
        let currentRules = ruleSets.conway;

        function createGrid() {
            return new Array(cols).fill(null).map(() => new Array(rows).fill(0));
        }

        function randomize(density = 'medium') {
            grid = createGrid();
            let densityFactor;
            switch(density) {
                case 'sparse': densityFactor = 0.1; break;
                case 'medium': densityFactor = 0.3; break;
                case 'dense': densityFactor = 0.5; break;
                case 'full': densityFactor = 0.7; break;
                default: densityFactor = 0.3;
            }
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    grid[i][j] = Math.random() < densityFactor ? 1 : 0;
                }
            }
            generation = 0;
        }

        function drawCell(x, y, alive) {
            if (alive) {
                let color = currentPalette.alive;
                if (color === 'rainbow') {
                    const hue = (Date.now() / 10 + x * 5 + y * 5) % 360;
                    color = `hsl(${hue}, 100%, 60%)`;
                }
                ctx.fillStyle = color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = currentPalette.glow;
            } else {
                ctx.fillStyle = currentPalette.dead;
                ctx.shadowBlur = 0;
            }
            ctx.fillRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    drawCell(i, j, grid[i][j]);
                }
            }
            ctx.shadowBlur = 0;
        }

        function countNeighbors(x, y) {
            let sum = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    const col = (x + i + cols) % cols;
                    const row = (y + j + rows) % rows;
                    sum += grid[col][row];
                }
            }
            return sum;
        }

        function update() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const state = grid[i][j];
                    const neighbors = countNeighbors(i, j);
                    if (state === 0 && currentRules.birth.includes(neighbors)) {
                        nextGrid[i][j] = 1;
                    } else if (state === 1 && currentRules.survive.includes(neighbors)) {
                        nextGrid[i][j] = 1;
                    } else {
                        nextGrid[i][j] = 0;
                    }
                }
            }
            // swap
            let temp = grid; grid = nextGrid; nextGrid = temp;
            generation++;
        }

        function countPopulation() {
            let pop = 0;
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    pop += grid[i][j];
                }
            }
            return pop;
        }

        function animate(timestamp) {
            const delta = timestamp - lastFrameTime;
            const speedMs = parseInt(speedSelect.value);

            if (delta >= speedMs) {
                lastFrameTime = timestamp - (delta % speedMs);
                fps = Math.round(1000 / delta);

                if (running) {
                    update();
                    drawGrid();
                    genCountEl.textContent = generation;
                    popCountEl.textContent = countPopulation();
                }
                fpsEl.textContent = fps;
            }

            requestAnimationFrame(animate);
        }

        // Interaction
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const i = Math.floor(x / cellSize);
            const j = Math.floor(y / cellSize);
            return [i, j];
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const [i, j] = getGridPos(e);
            if (i >= 0 && i < cols && j >= 0 && j < rows) {
                drawMode = grid[i][j] ? 0 : 1; // toggle based on starting cell
                grid[i][j] = drawMode;
                drawGrid();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const [i, j] = getGridPos(e);
            if (i >= 0 && i < cols && j >= 0 && j < rows) {
                grid[i][j] = drawMode;
                drawGrid();
                popCountEl.textContent = countPopulation();
            }
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        // Touch
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            const i = Math.floor(x / cellSize);
            const j = Math.floor(y / cellSize);
            if (i >= 0 && i < cols && j >= 0 && j < rows) {
                drawMode = 1;
                grid[i][j] = 1;
                drawGrid();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const i = Math.floor((touch.clientX - rect.left) / cellSize);
            const j = Math.floor((touch.clientY - rect.top) / cellSize);
            if (i >= 0 && i < cols && j >= 0 && j < rows) {
                grid[i][j] = 1;
                drawGrid();
                popCountEl.textContent = countPopulation();
            }
        });

        // Controls
        playPauseBtn.addEventListener('click', () => {
            running = !running;
            playPauseBtn.textContent = running ? 'PAUSE' : 'PLAY';
            playPauseBtn.classList.toggle('active', running);
        });

        colorSchemeSelect.addEventListener('change', () => {
            const scheme = colorSchemeSelect.value;
            currentPalette = colorPalettes[scheme];
            drawGrid();
        });

        densitySelect.addEventListener('change', () => {
            randomize(densitySelect.value);
            drawGrid();
            popCountEl.textContent = countPopulation();
        });

        clearBtn.addEventListener('click', () => {
            grid = createGrid();
            generation = 0;
            drawGrid();
            popCountEl.textContent = 0;
        });

        randomBtn.addEventListener('click', () => {
            randomize(densitySelect.value);
            drawGrid();
            popCountEl.textContent = countPopulation();
        });

        rulesSelect.addEventListener('change', () => {
            currentRules = ruleSets[rulesSelect.value];
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                running = !running;
                playPauseBtn.textContent = running ? 'PAUSE' : 'PLAY';
            }
            if (e.code === 'KeyC') {
                grid = createGrid();
                generation = 0;
                drawGrid();
                popCountEl.textContent = 0;
            }
            if (e.code === 'KeyR') {
                randomize(densitySelect.value);
                drawGrid();
                popCountEl.textContent = countPopulation();
            }
        });

        // Detect touch device
        if ('ontouchstart' in window) {
            document.querySelector('.mobile-draw').style.display = 'block';
        }

        // Init
        randomize('medium');
        drawGrid();
        animate(0);
    </script>
</body>
</html>
